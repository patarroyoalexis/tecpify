<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Navbar Móvil Tecpify</title>
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --navbar-bg: #0a0a0a;
            --navbar-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-bg: #1a1a1a;
            --accent-active: #2a2a2a;
            --fab-bg: #0a0a0a;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-canvas);
            color: #334155;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        .showcase-container {
            width: 100%;
            max-width: 375px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 8px;
            text-align: center;
        }

        /* Navbar Base */
        .navbar {
            background-color: var(--navbar-bg);
            border: 1px solid var(--navbar-border);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-lg);
            width: 100%;
            z-index: 50;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .isotipo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .context-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .section-name {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
        }

        .business-name {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 400;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        /* Menu Panel */
        .menu-overlay {
            position: relative;
            width: 100%;
        }

        .menu-panel {
            position: absolute;
            top: 12px;
            right: 0;
            width: 240px;
            background-color: var(--navbar-bg);
            border: 1px solid var(--navbar-border);
            border-radius: 16px;
            padding: 8px;
            box-shadow: var(--shadow-premium);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 40;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .menu-item:hover {
            background-color: var(--accent-bg);
            color: var(--text-primary);
        }

        .menu-item.active {
            background-color: var(--accent-active);
            color: var(--text-primary);
        }

        .menu-item svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
        }

        .separator {
            height: 1px;
            background-color: var(--navbar-border);
            margin: 4px 8px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background-color: var(--fab-bg);
            border: 1px solid var(--navbar-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: var(--shadow-premium);
            cursor: pointer;
            z-index: 100;
        }

        /* Mockup Layout */
        .mockup-frame {
            position: relative;
            height: 400px; /* Shortened for display */
            width: 100%;
            background: white;
            border-radius: 32px;
            border: 8px solid #f1f5f9;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .mockup-frame-tall {
            height: 550px;
        }

        .content-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            font-style: italic;
            font-size: 14px;
        }

        /* Floating Button Inline for Showcase */
        .fab-inline {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 52px;
            height: 52px;
            background-color: var(--fab-bg);
            border: 1px solid var(--navbar-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: var(--shadow-premium);
        }
    </style>
</head>
<body>

    <!-- STATE 1: COLLAPSED -->

        <div class="mockup-frame">
            <nav class="navbar">

                    <div class="context-info">

                    </button>
                    <button class="icon-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                    </button>
                </div>
            </nav>
            <div class="content-placeholder">Área de trabajo</div>
            <div class="fab-inline">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            </div>
        </div>
    </div>

        <div class="mockup-frame mockup-frame-tall">
            <nav class="navbar">

                    <img src="./public/images/landing/Isotipo-Tecpify.png" alt="Tecpify" class="isotipo">

                    <div class="separator"></div>

            </div>

            <div class="content-placeholder"></div>
            
            <div class="fab-inline">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            </div>
        </div>
    </div>

</body>
</html>
